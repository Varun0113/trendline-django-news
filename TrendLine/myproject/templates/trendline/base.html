<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrendLine{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #050816;
            --bg-1: #0b1230;
            --bg-2: #1a2d67;
            --surface: #ffffff;
            --surface-soft: rgba(255, 255, 255, 0.08);
            --line: rgba(255, 255, 255, 0.16);
            --text: #111827;
            --text-soft: #5b6478;
            --light-text: #eaf0ff;
            --brand: #4f7cff;
            --brand-strong: #2f5ee6;
            --radius-lg: 18px;
            --radius-md: 12px;
            --shadow-lg: 0 16px 40px rgba(5, 12, 34, 0.28);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(900px 420px at 6% -8%, rgba(33, 212, 253, 0.2), transparent 44%),
                radial-gradient(820px 420px at 95% 8%, rgba(124, 58, 237, 0.18), transparent 50%),
                linear-gradient(145deg, var(--bg-0) 0%, var(--bg-1) 52%, var(--bg-2) 100%);
        }

        .auth-topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(9, 14, 34, 0.72);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .auth-topbar-inner {
            width: min(1200px, calc(100% - 40px));
            margin: 0 auto;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            color: var(--light-text);
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .brand-mark {
            width: 28px;
            height: 28px;
            border-radius: 9px;
            background: linear-gradient(135deg, #21d4fd, #4f7cff);
            box-shadow: 0 10px 20px rgba(79, 124, 255, 0.45);
        }

        .top-links {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .top-link {
            color: rgba(234, 240, 255, 0.92);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            padding: 4px 0;
        }

        .top-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #21d4fd, #95afff);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.25s ease;
        }

        .top-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .auth-shell {
            width: min(1200px, calc(100% - 40px));
            margin: 0 auto;
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: center;
            padding: 34px 0 42px;
        }

        .auth-layout {
            width: 100%;
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            gap: 28px;
            align-items: stretch;
        }

        .auth-visual {
            border-radius: var(--radius-lg);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            border: 1px solid var(--line);
            padding: 34px;
            color: var(--light-text);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            width: fit-content;
            padding: 6px 12px;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: #d3e0ff;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            margin-bottom: 14px;
        }

        .auth-visual h1 {
            font-size: clamp(1.9rem, 4vw, 2.85rem);
            line-height: 1.15;
            margin-bottom: 12px;
        }

        .auth-visual p {
            color: rgba(234, 240, 255, 0.86);
            font-size: 1rem;
            margin-bottom: 20px;
            max-width: 560px;
        }

        .auth-points {
            list-style: none;
            display: grid;
            gap: 10px;
            color: rgba(234, 240, 255, 0.9);
            font-size: 0.96rem;
        }

        .auth-points li {
            display: flex;
            gap: 10px;
        }

        .auth-points li::before {
            content: "•";
            color: #8ab0ff;
            font-weight: 900;
        }

        .auth-card {
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(226, 235, 255, 0.85);
            box-shadow: 0 20px 44px rgba(6, 13, 34, 0.24);
            padding: 30px;
            align-self: center;
        }

        .form-title {
            font-size: 1.95rem;
            line-height: 1.2;
            margin-bottom: 8px;
            color: #111827;
        }

        .form-subtitle {
            color: var(--text-soft);
            font-size: 0.94rem;
            margin-bottom: 20px;
        }

        .messages {
            margin-bottom: 16px;
        }

        .alert {
            border-radius: 10px;
            padding: 9px 12px;
            font-size: 0.92rem;
            margin-bottom: 8px;
        }

        .alert-success {
            background: #ecfdf3;
            border: 1px solid #abe9c3;
            color: #11753f;
        }

        .alert-error {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #be123c;
        }

        .auth-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-control,
        .auth-form input[type="text"],
        .auth-form input[type="email"],
        .auth-form input[type="password"] {
            width: 100%;
            min-height: 44px;
            border-radius: 12px;
            border: 1px solid #d7e2ff;
            background: #fbfcff;
            padding: 11px 14px;
            font-size: 0.95rem;
            color: #111827;
            transition: var(--transition);
        }

        .form-control:focus,
        .auth-form input[type="text"]:focus,
        .auth-form input[type="email"]:focus,
        .auth-form input[type="password"]:focus {
            outline: none;
            border-color: #89a9ff;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.18);
            background: #fff;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 0.88rem;
            color: #525f78;
        }

        .meta-row label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .link-inline {
            color: var(--brand-strong);
            text-decoration: none;
            font-weight: 600;
        }

        .link-inline:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            min-height: 46px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.98rem;
            transition: var(--transition);
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, #4f7cff 0%, #2f5ee6 100%);
            box-shadow: 0 14px 24px rgba(47, 94, 230, 0.32);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(47, 94, 230, 0.38);
        }

        .form-note {
            margin-top: 14px;
            text-align: center;
            color: #5b6478;
            font-size: 0.93rem;
        }

        .reveal-up {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .reveal-up.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 980px) {
            .auth-shell {
                align-items: flex-start;
                padding-top: 22px;
            }

            .auth-layout {
                grid-template-columns: 1fr;
            }

            .auth-visual {
                padding: 28px;
            }
        }

        @media (max-width: 620px) {
            .auth-topbar-inner,
            .auth-shell {
                width: calc(100% - 24px);
            }

            .top-links {
                gap: 14px;
            }

            .top-link {
                font-size: 0.93rem;
            }

            .auth-card {
                padding: 22px 16px;
            }
        }
    </style>
</head>
<body>
    <header class="auth-topbar">
        <div class="auth-topbar-inner">
            <a href="{% url 'home' %}" class="brand">
                <span class="brand-mark"></span>
                <span>TrendLine</span>
            </a>
            <nav class="top-links">
                <a href="{% url 'home' %}" class="top-link">Home</a>
                <a href="{% url 'login' %}" class="top-link">Login</a>
                <a href="{% url 'register' %}" class="top-link">Register</a>
            </nav>
        </div>
    </header>

    <main class="auth-shell">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const revealItems = document.querySelectorAll('.reveal-up');
            revealItems.forEach((item, index) => {
                setTimeout(() => item.classList.add('show'), 90 + (index * 90));
            });

            const formInputs = document.querySelectorAll('.auth-form input[type="text"], .auth-form input[type="email"], .auth-form input[type="password"]');
            formInputs.forEach(input => {
                if (!input.classList.contains('form-control')) {
                    input.classList.add('form-control');
                }
            });
        });
    </script>
</body>
</html>
